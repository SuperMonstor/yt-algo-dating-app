version: "3.8"

services:
  test-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ytalgo_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d ytalgo_test"]
      interval: 2s
      timeout: 5s
      retries: 10
